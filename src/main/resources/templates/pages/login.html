<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GYMTRACK PRO</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/header.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo y título -->
            <h1 class="logo-title">GymTrack Pro</h1>
            <p class="subtitle">Inicia sesión para continuar tu progreso</p>

            <!-- Formulario -->
            <form class="login-form">
                <!-- Campo Correo Electrónico -->
                <div class="form-group">
                    <label for="email">CORREO ELECTRÓNICO</label>
                    <input type="email" id="email" placeholder="tucorreo@email.com" required>
                </div>

                <!-- Campo Contraseña -->
                <div class="form-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <!-- Botón Iniciar sesión -->
                <button type="submit" class="btn-login">Iniciar sesión</button>

                <!-- Enlace Registro -->
                <p class="register-link">
                    ¿No tienes cuenta? <a href="#">Registrate aquí</a>
                </p>
            </form>
        </div>
    </div>
</body>

<script src="../js/diet.js"></script>
    <script src="..//js/app.js"></script>
</html>
