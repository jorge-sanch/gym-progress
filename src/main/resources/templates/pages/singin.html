<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GYMTRACK PRO</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/header.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo y título -->
            <h1 class="logo-title">Crea tu cuenta</h1>
            <p class="subtitle">Comienza tu transformación hoy</p>

            <!-- Formulario -->
            <form class="login-form">
                <!-- Campo Nombre -->
                <div class="form-group">
                    <label for="name">NOMBRE</label>
                    <input type="text" id="name" placeholder="Ej. Jorge Sánchez" required>
                </div>
                <!-- Campo Correo Electrónico -->
                <div class="form-group">
                    <label for="email">CORREO ELECTRÓNICO</label>
                    <input type="email" id="email" placeholder="tucorreo@email.com" required>
                </div>


                <!-- Campo Contraseña -->
                <div class="form-group">
                    <label for="password">CONTRASEÑA</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <!-- Campo Confirmar Contraseña -->
                <div class="form-group">
                    <label for="confirm-password">CONFIRMAR CONTRASEÑA</label>
                    <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
                </div>

                <!-- Campo Peso -->
                <div class="form-group">
                    <label for="weight">PESO (kg)</label>
                    <input type="number" id="weight" placeholder="Ej. 70" required>
                </div>

                <!-- Botón Iniciar sesión -->
                <button type="submit" class="btn-login">Crear cuenta</button>

                <!-- Enlace Registro -->
                <p class="register-link">
                </p>
            </form>
        </div>
    </div>
</body>

<script src="../js/diet.js"></script>
    <script src="..//js/app.js"></script>
</html>
